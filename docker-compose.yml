services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: fitgen_ai
      POSTGRES_USER: fitgen
      POSTGRES_PASSWORD: fitgen
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fitgen -d fitgen_ai"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    environment:
      APP_ENV: development
      DATABASE_URL: postgresql+psycopg://fitgen:fitgen@db:5432/fitgen_ai
      AUTO_CREATE_TABLES: "false"
      ALLOWED_ORIGINS: http://127.0.0.1:5173,http://localhost:5173,http://127.0.0.1:8080,http://localhost:8080
      ENABLE_DEMO_ROUTES: "true"
    ports:
      - "8010:8000"
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"

  frontend:
    build:
      context: ./frontend-modern
      args:
        VITE_API_BASE_URL: http://127.0.0.1:8010
    ports:
      - "8080:80"
    depends_on:
      - api

volumes:
  postgres_data:
