services:
  - type: web
    name: fitgen-api
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: APP_ENV
        value: production
      - key: AUTO_CREATE_TABLES
        value: false
      - key: ENABLE_DEMO_ROUTES
        value: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: fitgen-postgres
          property: connectionString

databases:
  - name: fitgen-postgres
    plan: starter
